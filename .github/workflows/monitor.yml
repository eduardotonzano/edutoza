name: Monitor de Notícias da Carteira

# Quando rodar:
on:
  # 1) Sozinho, toda manhã (seg a sex) às 08:00 de Brasília (= 11:00 UTC).
  #    Para mudar o horário, ajuste o número do meio (hora em UTC).
  schedule:
    - cron: "0 11 * * 1-5"
  # 2) Manualmente, pelo botão "Run workflow" na aba Actions.
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Rodar o monitor
        run: python main.py --carteira Planilha_para_API.xlsx --saida relatorio.xlsx

      - name: Publicar o relatório (Excel) como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-noticias
          path: relatorio.xlsx
          retention-days: 90
