name: Monitor de Notícias da Carteira

# Quando rodar:
on:
  # AGENDAMENTO (nativo do GitHub) - alvo ~17h BRT. Marcado as 19:50 UTC (16:50 BRT) e num
  # minuto FORA do topo da hora de proposito: o GitHub atrasa muito mais as :00, entao um
  # minuto "quebrado" e um pouco antes faz a fila tender a cair perto das 17h.
  # IMPORTANTE: o GitHub NAO garante o minuto exato (pode variar) - e o melhor possivel sem
  # depender de servico externo. O gatilho externo (cron-job.org / AGENDADOR_17H.md) esta
  # EM ESPERA (deu 401 no token); se um dia for ativado, remova este schedule p/ nao duplicar.
  schedule:
    - cron: "50 19 * * *"
  workflow_dispatch:
    inputs:
      pular_gdelt:
        description: "Pular o GDELT (teste das fontes oficiais sem acionar o limite de IP)"
        required: false
        default: "false"

jobs:
  monitorar:
    # Roda no runner gratuito do GitHub (na nuvem). A coleta usa o GDELT,
    # que não bloqueia IPs de datacenter, então não precisa de máquina sua.
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Node (para o Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          # CLI do Claude Code: RESERVA gratis do resumo de IA (Haiku), autenticado pela
          # assinatura Pro/Max via o segredo CLAUDE_CODE_OAUTH_TOKEN. Se falhar, o robo
          # segue so com o Gemini (sem erro).
          npm install -g @anthropic-ai/claude-code || echo "Claude Code CLI nao instalado (segue so com Gemini)"

      - name: Rodar o monitor
        # GEMINI_API_KEY (opcional, GRATUITA): se cadastrada em Settings > Secrets, o
        # robo preenche RESUMO IA e IMPACTO com o Google Gemini. Sem ela, essas colunas
        # ficam vazias e o resto roda normal. Pegue a chave em https://aistudio.google.com.
        env:
          # Resumo de IA com 2 analistas (otimista x cetico), 100% GRATUITO:
          #   - Gemini (principal, gratis): segredo GEMINI_API_KEY (https://aistudio.google.com).
          #   - Claude Code/Haiku (reserva): segredo CLAUDE_CODE_OAUTH_TOKEN, gerado pela
          #     assinatura Pro/Max com `claude setup-token` (NAO usa a API paga da Anthropic).
          # Sem nenhuma das duas, o resumo e pulado e o resto roda normal.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PULAR_GDELT: ${{ github.event.inputs.pular_gdelt == 'true' && '1' || '' }}
          # A SEC exige e-mail de contato no User-Agent (senao da 403). Usa o mesmo
          # e-mail do envio (segredo MAIL_USERNAME); nao fica escrito no codigo.
          SEC_CONTACT: ${{ secrets.MAIL_USERNAME }}
          # API de noticias (NewsData.io) - OPCIONAL e gratuita. Sem o segredo, e pulada.
          # Pegue a chave em https://newsdata.io e cadastre como segredo NEWS_API_KEY.
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python -u main.py --carteira carteira_completa.csv --saida relatorio.xlsx

      - name: Descobrir a data de hoje (Brasília)
        id: hoje
        run: echo "data=$(TZ=America/Sao_Paulo date '+%d/%m/%Y')" >> "$GITHUB_OUTPUT"

      - name: Publicar o relatório (Excel) como artefato (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-noticias
          path: |
            relatorio.xlsx
            Principais_Noticias_24h.pdf
          retention-days: 90

      # ETAPA FINAL: envia o Excel por e-mail. Precisa de 2 "segredos"
      # cadastrados no repositório (Settings > Secrets and variables > Actions):
      #   MAIL_USERNAME = seu e-mail do Gmail
      #   MAIL_PASSWORD = uma "Senha de app" do Gmail (16 letras)
      - name: Enviar o relatório por e-mail (etapa final)
        # Só envia se os segredos do e-mail já estiverem cadastrados.
        # Enquanto não estiverem, esta etapa é pulada (sem dar erro).
        if: ${{ env.MAIL_USERNAME != '' && env.MAIL_PASSWORD != '' }}
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Notícias da Carteira - ${{ steps.hoje.outputs.data }}"
          to: eduardotonzano@gmail.com
          from: Monitor de Notícias <${{ secrets.MAIL_USERNAME }}>
          body: |
            Bom dia/boa tarde!

            Seguem em anexo, referentes às últimas 24 horas (${{ steps.hoje.outputs.data }}):
            - "Principais_Noticias_24h.pdf": as notícias do dia com resumo de IA e impacto.
            - "relatorio.xlsx": a planilha completa (todos os ativos, status e abas).
          attachments: relatorio.xlsx,Principais_Noticias_24h.pdf
