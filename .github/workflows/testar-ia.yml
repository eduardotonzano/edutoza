name: Testar IA (Gemini)

# Workflow manual de diagnostico: confirma que GEMINI_API_KEY + o modelo funcionam,
# mandando 1 noticia de exemplo ao Gemini. Rode pelo botao "Run workflow".
on:
  workflow_dispatch:

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Testar resumo por IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python _teste_ia.py
